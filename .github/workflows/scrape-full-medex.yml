name: Scrape MedEx Full Catalog

on:
  workflow_dispatch:
    inputs:
      total_pages:
        description: "How many MedEx list pages to include in this run"
        required: true
        default: "839"
      batch_size:
        description: "How many MedEx list pages per job"
        required: true
        default: "30"
      max_parallel:
        description: "How many jobs to run at the same time"
        required: true
        default: "2"

permissions:
  contents: read

jobs:
  plan-batches:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.make-matrix.outputs.matrix }}
      total_batches: ${{ steps.make-matrix.outputs.total_batches }}

    steps:
      - name: Build batch matrix
        id: make-matrix
        shell: python
        env:
          TOTAL_PAGES: ${{ inputs.total_pages }}
          BATCH_SIZE: ${{ inputs.batch_size }}
        run: |
          import json
          import math
          import os
          import sys

          total_pages = int(os.environ["TOTAL_PAGES"])
          batch_size = int(os.environ["BATCH_SIZE"])

          if total_pages < 1:
              raise ValueError("total_pages must be >= 1")
          if batch_size < 1:
              raise ValueError("batch_size must be >= 1")

          batches = []
          for start in range(1, total_pages + 1, batch_size):
              end = min(start + batch_size - 1, total_pages)
              batches.append({"start": start, "end": end})

          if len(batches) > 256:
              raise ValueError(
                  f"Matrix would create {len(batches)} jobs, which exceeds GitHub's 256-job matrix limit. "
                  f"Increase batch_size or reduce total_pages."
              )

          matrix = {"batch": batches}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
              fh.write(f"total_batches={len(batches)}\n")

          print(json.dumps(matrix, indent=2))
          print(f"Total batches: {len(batches)}")

  scrape:
    needs: plan-batches
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.plan-batches.outputs.matrix) }}

    env:
      REQUEST_TIMEOUT_SECONDS: "30"
      MAX_RETRIES: "5"
      INITIAL_BACKOFF_SECONDS: "2.0"
      RANDOM_JITTER_SECONDS: "0.8"
      SLEEP_BETWEEN_PRODUCTS: "1.2"
      SLEEP_BETWEEN_PAGES: "3.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          echo "Running pages ${{ matrix.batch.start }} to ${{ matrix.batch.end }}"
          python scrape_medex_full.py \
            --start-page "${{ matrix.batch.start }}" \
            --end-page "${{ matrix.batch.end }}"

      - name: Show output files
        run: ls -lah output || true

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: medex-output-${{ matrix.batch.start }}-${{ matrix.batch.end }}
          path: output/*.xlsx
          if-no-files-found: error
          retention-days: 14
